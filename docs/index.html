<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Batawa Sign-In · Canadian Ski Patrol</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --snow:#eef2f5; --surface:#ffffff; --ink:#16202b; --muted:#5c6b7a;
    --line:#dde4ea; --red:#c8102e; --red-press:#a50d26; --alpine:#21506a;
    --go:#157a47; --go-press:#0f5e38;
    --ok:#1d7a52; --shadow:0 1px 0 rgba(22,32,43,.04),0 6px 22px rgba(22,32,43,.07);
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--snow);color:var(--ink);-webkit-text-size-adjust:100%;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:18px;line-height:1.45;padding:max(16px,env(safe-area-inset-top)) 16px 16px;}
  .wrap{max-width:820px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:16px}
  .eyebrow{font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:var(--alpine);font-weight:600}
  h1{font-size:30px;font-weight:700;letter-spacing:-.02em;margin:.1em 0 0}
  .clock{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;line-height:1.25}
  .clock b{display:block;color:var(--ink);font-size:22px;font-weight:600}

  .todayhead{display:flex;align-items:baseline;justify-content:space-between;margin:0 4px 10px}
  .todayhead .lbl{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .todayhead .count{color:var(--muted);font-size:14px}
  .datepick{display:flex;align-items:center;gap:8px}
  .datepick input[type=date]{font:inherit;font-size:15px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
  .todaybtn{font:inherit;font-size:14px;font-weight:600;padding:8px 12px;border:1px solid var(--line);background:#fff;border-radius:9px;color:var(--alpine);cursor:pointer}
  .todaybtn:active{background:var(--snow)}
  .navday{padding:7px 13px;font-size:18px;line-height:1;color:var(--alpine)}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px}

  .row{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--line);
       border-radius:12px;margin-bottom:10px;min-height:74px;background:#fff}
  .row:last-child{margin-bottom:0}
  .row .info{flex:1;min-width:0}
  .row .nm{font-size:20px;font-weight:600;line-height:1.2}
  .row .nmtxt[title]{cursor:help;text-decoration:underline dotted var(--line);text-underline-offset:3px}
  .row .meta{color:var(--muted);font-size:14px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row.done{opacity:.55}
  .tag{display:inline-block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;
       color:var(--alpine);background:#e7eef3;border-radius:6px;padding:2px 7px;margin-left:8px;vertical-align:middle}

  .act{flex:0 0 auto;font:inherit;font-weight:700;font-size:14px;padding:7px 14px;border-radius:8px;border:0;cursor:pointer;min-height:0;min-width:80px}
  .act-in{background:var(--go);color:#fff} .act-in:active{background:var(--go-press)}
  .act-out{background:#fff;color:var(--ink);border:1px solid var(--line)} .act-out:active{background:var(--snow)}
  .since{color:var(--muted);font-size:14px;margin-right:4px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .actset{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .act-end{background:#fff;color:var(--alpine);border:1px solid var(--line)} .act-end:active{background:var(--snow)}
  .outdone{color:var(--muted);font-size:15px;font-weight:600;white-space:nowrap}

  .shiftbox{border:1px solid var(--line);border-radius:14px;background:var(--surface);box-shadow:var(--shadow);padding:2px 16px 6px;margin-bottom:18px}
  .shiftbox .grouphd{margin:14px 2px 4px}
  .shiftbox .grouphd::after{display:none}
  .shiftbox .row{border:0;border-radius:0;margin-bottom:0;background:transparent;min-height:62px;border-top:1px solid var(--line)}
  .shiftbox .grouphd + .row{border-top:0}

  .addrow{width:100%;font:inherit;font-weight:600;font-size:17px;padding:18px;margin-top:14px;cursor:pointer;
          background:transparent;border:1.5px dashed var(--line);border-radius:12px;color:var(--alpine)}
  .addrow:hover{border-color:var(--alpine)}

  .search{width:100%;font:inherit;font-size:20px;padding:16px 18px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:14px}
  .search:focus{outline:3px solid rgba(33,80,106,.25);border-color:var(--alpine)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;max-height:42vh;overflow:auto}
  .name{font:inherit;font-size:19px;text-align:left;padding:18px 16px;border:1px solid var(--line);background:#fff;border-radius:12px;cursor:pointer;min-height:62px}
  .name:hover{border-color:var(--alpine)}
  .who{font-size:24px;font-weight:700;margin:0 0 2px}
  .sched{color:var(--muted);font-size:15px;margin:0 0 18px}
  label{display:block;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 6px}
  .field{margin-bottom:16px}
  select{width:100%;font:inherit;font-size:19px;padding:15px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;appearance:none}
  select:focus{outline:3px solid rgba(33,80,106,.25);border-color:var(--alpine)}
  .btnrow{display:flex;gap:12px;margin-top:6px}
  .btn{flex:1;font:inherit;font-weight:700;font-size:20px;padding:20px;border-radius:12px;border:0;cursor:pointer;min-height:68px}
  .btn-primary{background:var(--red);color:#fff} .btn-primary:active{background:var(--red-press)}
  .btn-ghost{flex:0 0 auto;background:#fff;color:var(--ink);border:1px solid var(--line)}

  .empty{color:var(--muted);text-align:center;padding:34px 10px}
  .grouphd{display:flex;align-items:center;gap:12px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--alpine);margin:22px 4px 10px}
  .grouphd::after{content:"";flex:1;height:1px;background:var(--line)}
  #board .grouphd:first-child{margin-top:2px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:16px 22px;border-radius:12px;font-weight:600;box-shadow:var(--shadow);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:92vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .toast.ok{background:var(--ok)} .toast.err{background:var(--red)}
  .hidden{display:none}
  @media (prefers-reduced-motion:reduce){.toast{transition:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Canadian Ski Patrol · Frontenac Zone</div>
      <h1>Batawa sign-in</h1>
    </div>
    <div class="clock"><b id="time">—</b><span id="date">—</span></div>
  </header>

  <!-- BOARD (main) -->
  <section id="view-board">
    <div class="todayhead">
      <div class="datepick">
        <button class="todaybtn navday" onclick="shiftDay(-1)" aria-label="Previous day">‹</button>
        <input type="date" id="boarddate" onchange="onDateChange()">
        <button class="todaybtn navday" onclick="shiftDay(1)" aria-label="Next day">›</button>
        <button class="todaybtn" onclick="goToday()">Today</button>
      </div>
      <span class="count" id="count"></span>
    </div>
    <div class="card">
      <div id="board"></div>
    </div>
    <button class="addrow" onclick="openManual()">＋ Someone not on today's list</button>
  </section>

  <!-- MANUAL (walk-in / override) -->
  <section id="view-manual" class="hidden">
    <div id="pick" class="card">
      <input id="search" class="search" placeholder="Search your name" autocomplete="off" oninput="renderNames()">
      <div id="names" class="grid"></div>
      <div class="btnrow"><button class="btn btn-ghost" onclick="showBoard()">Back to today</button></div>
    </div>
    <div id="confirm" class="card hidden">
      <p class="who" id="who"></p>
      <p class="sched" id="sched"></p>
      <div class="field"><label for="role">Role</label><select id="role"></select></div>
      <div class="field"><label for="shift">Shift</label><select id="shift"></select></div>
      <div class="btnrow">
        <button class="btn btn-ghost" onclick="backToPick()">Back</button>
        <button class="btn btn-primary" id="signin-btn" onclick="doManualSignIn()">Sign in</button>
      </div>
    </div>
  </section>
</div>
<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = "https://mgnpfgziiwqhfcrkqkqa.supabase.co";
const SUPABASE_KEY = "sb_publishable_UZw7sVPRN-Q51-zzXW1htQ_2HQwd2t3";
const FALLBACK_SHIFTS = ["Morning Shift","Afternoon Shift","Night Shift","Evening Staff Event"];
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth:{ persistSession:false } });

let roster=[], positions=[], todayShifts=[], selected=null;
let KIOSK_CODE="";   // shared access code; injected into every kiosk call

function toast(msg, kind){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="toast show "+(kind||"");
  setTimeout(()=>{ t.className="toast "+(kind||""); }, 2600);
}
async function rpc(name,args){
  const a=Object.assign({}, args||{}); a.p_code=KIOSK_CODE||null;
  const {data,error}=await db.rpc(name,a);
  if(error){ console.error(name,error); toast("Couldn't reach the system — try again","err"); throw error; }
  return data;
}
function hhmm(ts){ return ts ? new Date(ts).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"}) : ""; }
function hhmmLocal(t){ // naive "YYYY-MM-DDTHH:MM:SS" -> H:MM
  if(!t) return ""; const m=String(t).match(/T(\d{2}):(\d{2})/); if(!m) return "";
  let h=+m[1]; const ap=h>=12?"PM":"AM"; h=h%12||12; return `${h}:${m[2]} ${ap}`;
}
function blockName(t){ // start hour -> shift name
  const m=String(t||"").match(/T(\d{2})/); const h=m?+m[1]:12;
  return h<12 ? "Morning Shift" : h<17 ? "Afternoon Shift" : "Night Shift";
}

function tick(){
  const now=new Date();
  document.getElementById("time").textContent=now.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
  document.getElementById("date").textContent=now.toLocaleDateString([],{weekday:"long",month:"long",day:"numeric"});
}
setInterval(tick,1000); tick();

// ---- board ----
async function loadStatic(){
  [roster,positions,todayShifts]=await Promise.all([
    rpc("kiosk_roster"), rpc("kiosk_positions"), rpc("kiosk_today_shifts")
  ]);
}
async function loadBoard(){
  let rows;
  const d=document.getElementById("boarddate").value;
  try{ rows=await rpc("kiosk_board", { p_date: d||null }); }catch(e){ return; }
  const board=document.getElementById("board");
  document.getElementById("count").textContent =
    rows.length ? `${rows.filter(r=>r.status==="in").length} signed in · ${rows.length} on board` : "";
  if(!rows.length){ board.innerHTML='<p class="empty">No shifts scheduled for this day. Use the button below to sign in.</p>'; return; }
  board.innerHTML="";

  // group by shift (time window), walk-ins last; within a shift, order roles SL -> OSR -> AFA -> OSRF
  const ROLE_ORDER=["SL","AFA","OSR","OSRF"];
  const roleRank=n=>{ const t=String(n||"").split("-").pop().trim().toUpperCase();
                      const i=ROLE_ORDER.indexOf(t); return i<0?99:i; };
  const groups=new Map();
  for(const r of rows){
    const key = r.scheduled && r.start_ts ? `${r.start_ts}~${r.end_ts}` : "walkins";
    if(!groups.has(key)) groups.set(key,{start:r.scheduled?r.start_ts:null,rows:[]});
    groups.get(key).rows.push(r);
  }
  const ordered=[...groups.entries()].sort((a,b)=>{
    if(a[0]==="walkins") return 1; if(b[0]==="walkins") return -1;
    return String(a[1].start||"").localeCompare(String(b[1].start||""));
  });

  const drawRow=(r,container)=>{
    const div=document.createElement("div");
    div.className="row"+(r.status==="done"?" done":"");
    const bits=[r.position_name, r.shift_label].filter(Boolean).join(" · ");
    let right;
    if(r.status==="open") right=`<button class="act act-in">Sign in</button>`;
    else if(r.status==="in") right=`<div class="actset"><span class="since">in since ${hhmm(r.signed_in_at)}</span>`
      +`${r.end_ts?`<button class="act act-end">Left at end · ${hhmmLocal(r.end_ts)}</button>`:""}`
      +`<button class="act act-out">Sign out now</button></div>`;
    else right=`<span class="outdone">Out · ${r.eligible_hours!=null?r.eligible_hours+" h":"—"}</span>`;
    const contact=[r.email, r.cell||r.phone].filter(Boolean).join(" · ");
    const nm=`<span class="nmtxt"${contact?` title="${contact}"`:""}>${r.name||r.helper_number}</span>`;
    div.innerHTML=`<div class="info"><div class="nm">${nm}`
      +`${r.scheduled?"":'<span class="tag">walk-in</span>'}</div>`
      +`<div class="meta">${bits||"&nbsp;"}</div></div>${right}`;
    container.appendChild(div);
    const inBtn=div.querySelector(".act-in"); if(inBtn) inBtn.onclick=()=>signInScheduled(r);
    const endBtn=div.querySelector(".act-end"); if(endBtn) endBtn.onclick=()=>leaveAtEnd(r.attendance_id, r.name);
    const outBtn=div.querySelector(".act-out"); if(outBtn) outBtn.onclick=()=>signOut(r.attendance_id, r.name);
  };

  for(const [key,g] of ordered){
    const box=document.createElement("div"); box.className="shiftbox";
    const hd=document.createElement("div"); hd.className="grouphd";
    if(key==="walkins"){ hd.textContent="Walk-ins"; }
    else {
      const start=g.rows[0].start_ts;
      const timeRange=`${hhmmLocal(start)}–${hhmmLocal(g.rows[0].end_ts)}`;
      const labels=new Set(g.rows.map(r=>r.shift_label).filter(Boolean));
      const name=(labels.size===1 && [...labels][0].length<=28) ? [...labels][0] : blockName(start);
      hd.textContent=`${name} · ${timeRange}`;
    }
    box.appendChild(hd);
    g.rows.sort((a,b)=>{ const d=roleRank(a.position_name)-roleRank(b.position_name);
                         return d || String(a.name||"").localeCompare(String(b.name||"")); });
    g.rows.forEach(r=>drawRow(r,box));
    board.appendChild(box);
  }
}
async function signInScheduled(r){
  try{
    await rpc("kiosk_sign_in",{p_helper_number:r.helper_number,p_shift_id:r.shift_id||"",
      p_position_id:r.position_id||"",p_shift_label:r.shift_label||""});
    toast(`Signed in · ${r.name||""}`.trim(),"ok"); loadBoard();
  }catch(e){}
}
async function signOut(id,name){
  try{
    const hrs=await rpc("kiosk_sign_out",{p_id:id});
    toast(`Signed out · ${name||""} · ${hrs!=null?hrs+" h":""}`.trim(),"ok"); loadBoard();
  }catch(e){}
}
async function leaveAtEnd(id,name){
  try{
    const hrs=await rpc("kiosk_leave_at_end",{p_id:id});
    toast(`Left at end of shift · ${name||""} · ${hrs!=null?hrs+" h":""}`.trim(),"ok"); loadBoard();
  }catch(e){}
}

// ---- manual (walk-in / override) ----
function openManual(){
  document.getElementById("view-board").classList.add("hidden");
  document.getElementById("view-manual").classList.remove("hidden");
  document.getElementById("search").value="";
  backToPick(); renderNames();
}
function showBoard(){
  document.getElementById("view-manual").classList.add("hidden");
  document.getElementById("view-board").classList.remove("hidden");
  loadBoard();
}
function renderNames(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  const list=roster.filter(p=>p.name.toLowerCase().includes(q));
  const el=document.getElementById("names"); el.innerHTML="";
  if(!list.length){ el.innerHTML='<p class="empty">No matching name.</p>'; return; }
  for(const p of list){
    const b=document.createElement("button"); b.className="name"; b.textContent=p.name;
    b.onclick=()=>selectPerson(p); el.appendChild(b);
  }
}
function selectPerson(person){
  selected={person,scheduled:todayShifts.find(s=>s.helper_number===person.helper_number)||null};
  const sched=selected.scheduled;
  document.getElementById("who").textContent=person.name;
  document.getElementById("sched").textContent=sched
    ? `Scheduled today: ${sched.shift_label||"shift"}${sched.position_name?" · "+sched.position_name:""}`
    : "Not on today's schedule — choose role and shift.";
  const role=document.getElementById("role"); role.innerHTML="";
  for(const pos of positions){ const o=document.createElement("option"); o.value=pos.position_id; o.textContent=pos.name; role.appendChild(o); }
  if(sched&&sched.position_id) role.value=sched.position_id;
  const labels=[...new Set([...todayShifts.map(s=>s.shift_label).filter(Boolean),...FALLBACK_SHIFTS])];
  const shift=document.getElementById("shift"); shift.innerHTML="";
  for(const l of labels){ const o=document.createElement("option"); o.value=l; o.textContent=l; shift.appendChild(o); }
  if(sched&&sched.shift_label) shift.value=sched.shift_label;
  document.getElementById("pick").classList.add("hidden");
  document.getElementById("confirm").classList.remove("hidden");
}
function backToPick(){
  document.getElementById("confirm").classList.add("hidden");
  document.getElementById("pick").classList.remove("hidden"); selected=null;
}
async function doManualSignIn(){
  if(!selected) return;
  const btn=document.getElementById("signin-btn"); btn.disabled=true;
  const roleVal=document.getElementById("role").value, shiftVal=document.getElementById("shift").value, sched=selected.scheduled;
  const shiftId=(sched&&sched.shift_label===shiftVal&&sched.position_id===roleVal)?sched.shift_id:"";
  try{
    await rpc("kiosk_sign_in",{p_helper_number:selected.person.helper_number,p_shift_id:shiftId,p_position_id:roleVal,p_shift_label:shiftVal});
    toast(`Signed in · ${selected.person.name}`,"ok"); showBoard();
  }catch(e){} finally{ btn.disabled=false; }
}

function pad(n){ return String(n).padStart(2,"0"); }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
let followToday = true;   // true while the board is tracking the current day
function setBoardDate(v){
  document.getElementById("boarddate").value = v;
  followToday = (v === todayStr());
  loadBoard();
}
function onDateChange(){ setBoardDate(document.getElementById("boarddate").value); }
function goToday(){ setBoardDate(todayStr()); }
function shiftDay(delta){
  const el=document.getElementById("boarddate");
  const base = el.value ? new Date(el.value+"T00:00:00") : new Date();
  base.setDate(base.getDate()+delta);
  setBoardDate(`${base.getFullYear()}-${pad(base.getMonth()+1)}-${pad(base.getDate())}`);
}

// Keep a shared tablet current: refresh on a timer and whenever the tab wakes
// or regains focus. If we're tracking "today" and the calendar day has rolled
// over (e.g. left on overnight), advance to the new day automatically.
function refreshBoard(){
  if(document.getElementById("view-board").classList.contains("hidden")) return;
  const t=todayStr();
  if(followToday && document.getElementById("boarddate").value!==t){
    document.getElementById("boarddate").value=t;
  }
  loadBoard();
}
setInterval(refreshBoard, 30000);
window.addEventListener("focus", refreshBoard);
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) refreshBoard(); });

// ---- access code gate ----
async function checkUnlock(code){
  try{
    const {data,error}=await db.rpc("kiosk_unlock",{p_code: code || null});
    return !error && data===true;
  }catch(e){ return false; }
}
async function boot(){
  document.getElementById("boarddate").value=todayStr();
  await loadStatic(); await loadBoard();
}
function showCodePrompt(msg){
  if(document.getElementById("codeov")){
    if(msg) document.getElementById("codeerr").textContent=msg; return;
  }
  const ov=document.createElement("div"); ov.id="codeov";
  ov.style.cssText="position:fixed;inset:0;background:var(--bg,#eef2f6);display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px";
  ov.innerHTML=
   `<div style="background:#fff;border:1px solid var(--line,#dfe5ec);border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.14);padding:30px 26px;max-width:380px;width:100%;text-align:center">
      <h2 style="margin:0 0 6px;font-size:23px;color:var(--alpine,#21506A)">Patrol Sign-In</h2>
      <p style="margin:0 0 16px;color:#5C6B7A">Enter the access code to continue.</p>
      <input id="codein" type="password" inputmode="text" autocomplete="off" placeholder="Access code"
        style="width:100%;box-sizing:border-box;padding:14px 16px;font-size:18px;border:1px solid var(--line,#dfe5ec);border-radius:12px;text-align:center">
      <div id="codeerr" style="color:#b3261e;min-height:18px;margin:8px 0 0;font-size:14px">${msg||""}</div>
      <button id="codego" style="margin-top:10px;width:100%;padding:14px;font-size:18px;font-weight:600;color:#fff;background:var(--alpine,#21506A);border:0;border-radius:12px;cursor:pointer">Continue</button>
    </div>`;
  document.body.appendChild(ov);
  const go=async()=>{
    const v=document.getElementById("codein").value.trim();
    if(await checkUnlock(v)){
      KIOSK_CODE=v; try{ localStorage.setItem("kioskCode",v); }catch(e){}
      ov.remove(); boot();
    } else {
      document.getElementById("codeerr").textContent="Incorrect code. Try again.";
    }
  };
  document.getElementById("codego").onclick=go;
  document.getElementById("codein").addEventListener("keydown",e=>{ if(e.key==="Enter") go(); });
  document.getElementById("codein").focus();
}
(async function start(){
  // Code from a bookmarked ?k=CODE (then strip it from the URL), else storage.
  try{
    const u=new URL(location.href);
    const k=u.searchParams.get("k");
    if(k){ KIOSK_CODE=k; try{ localStorage.setItem("kioskCode",k); }catch(e){}
           u.searchParams.delete("k"); history.replaceState(null,"",u.pathname+u.search+u.hash); }
    else { try{ KIOSK_CODE=localStorage.getItem("kioskCode")||""; }catch(e){ KIOSK_CODE=""; } }
  }catch(e){ KIOSK_CODE=""; }
  if(await checkUnlock(KIOSK_CODE)) boot();
  else showCodePrompt();
})();
</script>
